<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navigation Pro - Xiaomi 4 Ultra</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    
    <style>
        :root {
            --accent: #007aff; --green: #15cc74; --bg-panel: rgba(255, 255, 255, 0.92);
            --text-main: #333; --shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { height: 100vh; width: 100vw; overflow: hidden; background: #e5e3df; color: var(--text-main); touch-action: none; }

        #map-wrapper { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 1; }
        #map { position: absolute; top: -25vh; left: -25vw; width: 150vw; height: 150vh; transition: transform 0.3s linear; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* --- BASE WIDGETS (LANDSCAPE PAR DÉFAUT) --- */
        .hud-bubble {
            position: absolute; background: var(--bg-panel); padding: 12px; border-radius: 12px;
            box-shadow: var(--shadow); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.5);
            transition: width 0.2s, height 0.2s, font-size 0.2s; cursor: grab;
        }
        .hud-bubble:active { cursor: grabbing; }
        
        #stats-bubble { top: 15px; left: 15px; font-weight: bold; line-height: 1.5; }
        .stats-sz-1 { font-size: 0.85rem; padding: 10px; }
        .stats-sz-2 { font-size: 1.15rem; padding: 15px; }
        .stats-sz-3 { font-size: 1.45rem; padding: 20px; }
        .stat-hl { color: var(--accent); font-weight: 900; }
        .stat-dplus { color: #d9534f; } .stat-dminus { color: var(--green); }
        .stat-total { font-size: 0.8em; color: #888; }

        #weather-bubble { top: 15px; right: 15px; font-weight: bold; display: flex; flex-direction: column; gap: 4px; }
        .weather-sz-1 { font-size: 0.85rem; }
        .weather-sz-2 { font-size: 1.15rem; padding: 15px; } .weather-sz-2 .w-icon { font-size: 1.5rem; }
        .weather-sz-3 { font-size: 1.45rem; padding: 20px; } .weather-sz-3 .w-icon { font-size: 1.9rem; }
        
        #speed-widget {
            bottom: 110px; left: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 50%; border: 4px solid var(--accent);
        }
        .speed-sz-1 { width: 85px; height: 85px; } .speed-sz-1 #speed-val { font-size: 2.3rem; }
        .speed-sz-2 { width: 125px; height: 125px; } .speed-sz-2 #speed-val { font-size: 3.5rem; }
        .speed-sz-3 { width: 170px; height: 170px; } .speed-sz-3 #speed-val { font-size: 5rem; }
        #speed-val { font-weight: 900; line-height: 1; color: #000; pointer-events: none;}
        .speed-unit { font-size: 0.85rem; font-weight: bold; color: #666; pointer-events: none;}

        #eta-widget {
            bottom: max(30px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); display: none;
            flex-direction: column; justify-content: center; align-items: center; padding: 10px 25px;
            border-bottom: 4px solid #ffcc00;
        }
        .eta-label { font-size: 0.8rem; color: #666; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; pointer-events: none;}
        .eta-val { font-size: 1.8rem; font-weight: 900; color: #222; pointer-events: none;}

        #nav-header {
            position: absolute; top: max(15px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
            background: var(--green); color: white; padding: 12px 25px; border-radius: 20px;
            display: none; align-items: center; gap: 15px; box-shadow: var(--shadow); min-width: 250px;
        }
        #nav-icon { font-size: 2.5rem; line-height: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
        #nav-dist { font-size: 1.8rem; font-weight: 900; }
        #nav-street { font-size: 1.1rem; font-weight: bold; }

        /* BOUTONS ACTIONS */
        #bottom-bar {
            position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); left: 0; width: 100vw;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 15px; pointer-events: none; z-index: 50;
        }
        .btn-group { display: flex; gap: 12px; pointer-events: auto; }
        
        .fab {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: white; box-shadow: var(--shadow); font-size: 1.6rem; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        #search-btn { color: var(--accent); }
        #gps-btn { color: #555; } #gps-btn.active { color: var(--green); }

        /* MODAL RECHERCHE */
        #search-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 92%; max-width: 450px; background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 100; display: none; max-height: 85vh; overflow-y: auto;
            cursor: grab; display: flex; flex-direction: column;
        }
        #search-modal h3 { margin-bottom: 10px; font-size: 1.2rem; }
        input { width: 100%; padding: 14px; font-size: 1rem; background: #f2f4f5; border: 1px solid #ddd; border-radius: 12px; font-weight: bold; margin-bottom: 10px; }
        #suggestions { list-style: none; margin-bottom: 10px; }
        #suggestions li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: 500; display: flex; justify-content: space-between; }
        #route-tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .route-tab { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #eee; color: #555; }
        .route-tab.active { background: var(--accent); color: white; }
        #route-details { background: #f2f4f5; padding: 10px 15px; border-radius: 12px; font-size: 0.95rem; font-weight: bold; display: grid; grid-template-columns: 1fr 1fr; gap: 5px 15px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 0; }
        #start-nav-btn { width: 100%; padding: 12px; margin-top: 10px; background: var(--green); color: white; border: none; border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.8rem; cursor: pointer; color: #888; }
        .marker-arrow svg { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }

        /* ========================================= */
        /* --- MODE PORTRAIT (ADAPTATION MOBILE) --- */
        /* ========================================= */
        @media (orientation: portrait) {
            #nav-header { width: 90%; }
            #stats-bubble { top: max(95px, env(safe-area-inset-top) + 80px); left: 15px; }
            #weather-bubble { top: max(95px, env(safe-area-inset-top) + 80px); right: 15px; }
            
            /* Les boutons passent en colonne sur la droite */
            #bottom-bar {
                top: 50%; right: 15px; bottom: auto; left: auto; width: auto;
                transform: translateY(-50%);
                flex-direction: column; align-items: flex-end; padding: 0;
            }
            .btn-group { flex-direction: column; gap: 12px; }
            
            #speed-widget { bottom: max(100px, env(safe-area-inset-bottom) + 80px); left: 15px; }
        }
    </style>
</head>
<body>

    <div id="map-wrapper"><div id="map"></div></div>

    <div id="ui-layer">
        
        <div id="nav-header" class="interactive">
            <div id="nav-icon">⬆️</div>
            <div><div id="nav-dist">-- m</div><div id="nav-street">Calcul...</div></div>
        </div>

        <div id="stats-bubble" class="hud-bubble stats-sz-1 interactive" onclick="resizeStats.call(this)">
            <div>Dist: <span id="dist-val" class="stat-hl">0.0</span> <span id="dist-total" class="stat-total"></span></div>
            <div>D+: <span id="dplus-val" class="stat-hl stat-dplus">0</span> <span id="dplus-total" class="stat-total"></span></div>
            <div>D-: <span id="dminus-val" class="stat-hl stat-dminus">0</span> <span id="dminus-total" class="stat-total"></span></div>
            <div id="batt-hud" style="display:none; margin-top:5px; border-top:1px solid #ccc; padding-top:2px;">
                🔋 <span id="batt-val" class="stat-hl">0.0</span> <span id="batt-total" class="stat-total"></span>
            </div>
        </div>

        <div id="weather-bubble" class="hud-bubble weather-sz-1 interactive" onclick="resizeWeather.call(this)">
            <div style="border-bottom:1px solid #ccc; padding-bottom:3px; margin-bottom:3px; color:var(--accent); pointer-events:none;">MÉTÉO</div>
            <div id="w-h0" style="pointer-events:none;">H: --°</div><div id="w-h1" style="pointer-events:none;">H+1: --°</div><div id="w-h2" style="pointer-events:none;">H+2: --°</div>
            <div style="margin-top:3px; pointer-events:none;">💨 <span id="wind-val">--</span> km/h</div>
        </div>

        <div id="speed-widget" class="hud-bubble speed-sz-2 interactive" onclick="resizeSpeed.call(this)">
            <div id="speed-val">0</div><div class="speed-unit">KM/H</div>
        </div>

        <div id="eta-widget" class="hud-bubble interactive" onclick="makeDraggable(this)">
            <div class="eta-label">Temps Restant</div>
            <div id="eta-val" class="eta-val">-- min</div>
        </div>

        <!-- BARRE DE BOUTONS (Responsive) -->
        <div id="bottom-bar">
            <div class="btn-group">
                <button class="fab" onclick="toggleFullScreen()" title="Plein Écran">🔲</button>
                <button class="fab" onclick="setWeight()" title="Régler le poids">⚖️</button>
                <button class="fab" onclick="toggleSatellite()" title="Vue Satellite">🗺️</button>
            </div>
            <div class="btn-group">
                <button id="gps-btn" class="fab" onclick="toggleTracking()">📍</button>
                <button id="search-btn" class="fab" onclick="openSearch()">🔍</button>
            </div>
        </div>
    </div>

    <!-- MODAL RECHERCHE -->
    <div id="search-modal" class="interactive">
        <span class="close-modal" onclick="closeSearch()">×</span>
        <h3 style="pointer-events:none;">Nouvelle Destination</h3>
        <input type="text" id="address-input" placeholder="Où va-t-on ?" autocomplete="off">
        <ul id="suggestions"></ul>
        <div id="route-summary" style="display:none;">
            <div id="route-tabs"></div>
            <div id="route-details"></div>
            <button id="start-nav-btn" onclick="startNavigation()">DÉMARRER LE TRAJET</button>
        </div>
    </div>

    <script>
        let map, userMarker, watchId = null;
        let isTracking = false, isNavigating = false, isRecalculating = false, userCoords = null, currentHeading = 0;
        let isSatellite = false;
        
        let speedSize = 2, weatherSize = 1, statsSize = 1;
        let userWeight = parseFloat(localStorage.getItem('scooterWeight')) || 90;
        const getTotalWeight = () => userWeight + 24.5;
        
        let totalDistanceCovered = 0, totalDPlus = 0, totalDMinus = 0, lastPos = null;
        let startNavDistance = 0, startNavDPlus = 0, startNavDMinus = 0;
        let totalWhConsumed = 0, startNavWh = 0; 
        
        let traversedPath = []; 
        const BATTERY_CAPACITY_WH = 561.6, SPEED_MPS = 25.0 / 3.6; 
        
        let routes = [], activeRoute = null, routeSteps = [], currentStepIndex = 0;
        let wakeLock = null;

        function calcDist(p1, p2) {
            const R = 6371e3, f1 = p1.lat * Math.PI/180, f2 = p2.lat * Math.PI/180;
            const df = (p2.lat-p1.lat) * Math.PI/180, dl = (p2.lon-p1.lon) * Math.PI/180;
            const a = Math.sin(df/2)*Math.sin(df/2) + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)*Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- DRAG & DROP SÉCURISÉ ---
        function makeDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            let dragging = false;
            elmnt.onmousedown = dragMouseDown; elmnt.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                if(['INPUT', 'BUTTON', 'LI'].includes(e.target.tagName) || e.target.closest('#route-details') || e.target.closest('#suggestions')) return;
                e = e || window.event;
                if(e.type !== "touchstart") e.preventDefault();
                
                const rect = elmnt.getBoundingClientRect();
                elmnt.style.transform = 'none';
                elmnt.style.left = rect.left + 'px'; elmnt.style.top = rect.top + 'px';
                elmnt.style.bottom = 'auto'; elmnt.style.right = 'auto';

                pos3 = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
                pos4 = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
                document.onmouseup = closeDragElement; document.onmousemove = elementDrag;
                document.ontouchend = closeDragElement; document.ontouchmove = elementDrag;
                dragging = false;
            }

            function elementDrag(e) {
                e = e || window.event; dragging = true;
                let clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
                pos1 = pos3 - clientX; pos2 = pos4 - clientY; pos3 = clientX; pos4 = clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null;
                setTimeout(() => dragging = false, 100);
            }
            elmnt.isDragging = () => dragging;
        }

        // --- SÉCURITÉ DE ROTATION DU TÉLÉPHONE ---
        window.addEventListener('orientationchange', () => {
            // Remet les widgets à leur position CSS par défaut pour s'adapter à la nouvelle orientation
            ['stats-bubble', 'weather-bubble', 'speed-widget', 'eta-widget', 'search-modal'].forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.style.top = ''; el.style.left = ''; el.style.bottom = ''; el.style.right = ''; el.style.transform = ''; }
            });
        });

        function initMap() {
            map = new maplibregl.Map({
                container: 'map', style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
                center: [2.2, 46.2], zoom: 6, pitch: 0, attributionControl: false
            });

            map.on('load', () => {
                map.addSource('satellite', { type: 'raster', tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize: 256 });
                map.addLayer({ id: 'satellite-layer', type: 'raster', source: 'satellite', layout: { visibility: 'none' } });

                map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } } });
                map.addLayer({ id: 'route-halo', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#007aff', 'line-width': 18, 'line-opacity': 0.25 } });
                map.addLayer({ id: 'route-line', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#007aff', 'line-width': 6, 'line-opacity': 0.9 } });

                map.addSource('path', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } } });
                map.addLayer({ id: 'path-line', type: 'line', source: 'path', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#15cc74', 'line-width': 6 } });

                startTracking();
            });
            document.getElementById('address-input').addEventListener('focus', showHistory);
            
            ['stats-bubble', 'weather-bubble', 'speed-widget', 'eta-widget', 'search-modal'].forEach(id => {
                makeDraggable(document.getElementById(id));
            });
        }

        function toggleSatellite() {
            isSatellite = !isSatellite;
            if(map.getLayer('satellite-layer')) map.setLayoutProperty('satellite-layer', 'visibility', isSatellite ? 'visible' : 'none');
        }

        async function requestWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        document.addEventListener('visibilitychange', async () => { if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock(); });

        function toggleFullScreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(err => {}); requestWakeLock(); } 
            else { document.exitFullscreen(); if(wakeLock) { wakeLock.release(); wakeLock = null; } }
        }

        function setWeight() {
            const w = prompt("Votre poids + équipement (kg) :", userWeight);
            if (w && !isNaN(w)) {
                userWeight = parseFloat(w); localStorage.setItem('scooterWeight', userWeight);
                alert(`Poids de calcul enregistré : ${userWeight} kg`);
            }
        }

        function resizeSpeed() { if(this.isDragging && this.isDragging()) return; speedSize = speedSize === 3 ? 1 : speedSize + 1; this.className = `hud-bubble speed-sz-${speedSize} interactive`; }
        function resizeWeather() { if(this.isDragging && this.isDragging()) return; weatherSize = weatherSize === 3 ? 1 : weatherSize + 1; this.className = `hud-bubble weather-sz-${weatherSize} interactive`; }
        function resizeStats() { if(this.isDragging && this.isDragging()) return; statsSize = statsSize === 3 ? 1 : statsSize + 1; this.className = `hud-bubble stats-sz-${statsSize} interactive`; }

        async function fetchWeather(lat, lon) {
            try {
                const data = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weather_code,wind_speed_10m&timezone=auto&forecast_days=2`)).json();
                const currentIso = new Date(new Date().setMinutes(0,0,0)).toISOString().slice(0, 16);
                let idx = data.hourly.time.findIndex(t => t.startsWith(currentIso));
                if(idx === -1) idx = 0;

                const getEmoji = (c) => c<=1?'<span class="w-icon">☀️</span>':c<=3?'<span class="w-icon">⛅</span>':c<=48?'<span class="w-icon">🌫️</span>':c<=67?'<span class="w-icon">🌧️</span>':c<=77?'<span class="w-icon">❄️</span>':c<=82?'<span class="w-icon">🌦️</span>':'<span class="w-icon">⛈️</span>';
                for(let i=0; i<=2; i++) {
                    const label = i===0 ? 'H' : `H+${i}`;
                    document.getElementById(`w-h${i}`).innerHTML = `${label}: ${getEmoji(data.hourly.weather_code[idx+i])} ${Math.round(data.hourly.temperature_2m[idx+i])}°`;
                }
                document.getElementById('wind-val').innerText = Math.round(data.hourly.wind_speed_10m[idx]);
            } catch(e) {}
        }

        let searchHistory = JSON.parse(localStorage.getItem('scooterHist') || '[]');
        function saveToHistory(place) {
            const name = place.display_name; const exists = searchHistory.findIndex(p => p.name === name);
            if(exists !== -1) searchHistory.unshift(searchHistory.splice(exists, 1)[0]);
            else searchHistory.unshift({name: name, lat: place.lat, lon: place.lon, fav: false});
            if(searchHistory.length > 5) searchHistory.pop(); localStorage.setItem('scooterHist', JSON.stringify(searchHistory));
        }

        function toggleFav(e, index) { e.stopPropagation(); searchHistory[index].fav = !searchHistory[index].fav; localStorage.setItem('scooterHist', JSON.stringify(searchHistory)); showHistory(); }

        function showHistory() {
            const box = document.getElementById('suggestions');
            if(document.getElementById('address-input').value.length > 0) return;
            box.innerHTML = '';
            searchHistory.forEach((h, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:85%;">${h.name.split(',')[0]}</span> 
                                <span onclick="toggleFav(event, ${i})" style="font-size:1.3rem;">${h.fav ? '⭐' : '☆'}</span>`;
                li.onclick = () => selectAddress({display_name: h.name, lat: h.lat, lon: h.lon});
                box.appendChild(li);
            });
        }

        let searchTimeout;
        document.getElementById('address-input').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const val = e.target.value;
            if (val.length === 0) return showHistory();
            if (val.length < 3) return document.getElementById('suggestions').innerHTML = '';
            
            searchTimeout = setTimeout(async () => {
                const data = await (await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&countrycodes=fr&limit=4`)).json();
                const box = document.getElementById('suggestions'); box.innerHTML = '';
                data.forEach(place => {
                    const li = document.createElement('li'); li.innerText = place.display_name.split(',').slice(0,3).join(',');
                    li.onclick = () => selectAddress(place); box.appendChild(li);
                });
            }, 500);
        });

        function openSearch() {
            if(!userCoords) return alert("Attendez le signal GPS !");
            document.getElementById('search-modal').style.display = 'flex';
            document.getElementById('route-summary').style.display = 'none';
            document.getElementById('address-input').value = ''; showHistory();
        }
        function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }

        async function selectAddress(place) {
            document.getElementById('address-input').value = place.display_name.split(',')[0]; 
            document.getElementById('suggestions').innerHTML = '<li style="justify-content:center; color:var(--accent);">Calcul des itinéraires...</li>';
            saveToHistory(place);

            routes = [];

            const fetchRoute = async (profile, label) => {
                const url = `https://routing.openstreetmap.de/routed-${profile}/route/v1/driving/${userCoords.lon},${userCoords.lat};${place.lon},${place.lat}?overview=full&geometries=geojson&steps=true`;
                try {
                    const res = await (await fetch(url)).json();
                    if(res.code !== "Ok") return null;
                    
                    const rt = res.routes[0]; const coords = rt.geometry.coordinates; 
                    const maxS = 40; const stepIdx = Math.max(1, Math.floor(coords.length / maxS));
                    let lats = [], lons = [], sampled = [];
                    for (let i=0; i<coords.length; i+=stepIdx) { lats.push(coords[i][1].toFixed(5)); lons.push(coords[i][0].toFixed(5)); sampled.push(coords[i]); }
                    
                    let whTotal = 0, dPlus = 0, dMinus = 0, dSampled = 0;
                    try {
                        const elev = await (await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats.join(',')}&longitude=${lons.join(',')}`)).json();
                        for (let i=0; i<sampled.length-1; i++) {
                            const d = calcDist({lat: sampled[i][1], lon: sampled[i][0]}, {lat: sampled[i+1][1], lon: sampled[i+1][0]});
                            if(d===0) continue;
                            dSampled += d/1000;
                            const eDiff = elev.elevation ? (elev.elevation[i+1] - elev.elevation[i]) : 0;
                            if(eDiff > 0) dPlus += eDiff; else dMinus += Math.abs(eDiff);
                            
                            const slope = eDiff / d;
                            let p = (0.015*getTotalWeight()*9.81 + 0.5*1.2*0.45*Math.pow(SPEED_MPS,2) + getTotalWeight()*9.81*slope) * SPEED_MPS;
                            if(p<0) p=0;
                            whTotal += ((p/0.75)*(d/SPEED_MPS))/3600;
                        }
                    } catch(e) {} 

                    const realDist = rt.distance/1000;
                    const scale = dSampled > 0 ? (realDist/dSampled) : 1;

                    return { profile: profile, name: label, dist: realDist, dPlus: dPlus*scale, dMinus: dMinus*scale, batt: ((whTotal*scale)/BATTERY_CAPACITY_WH)*100, coords: coords, steps: rt.legs[0].steps };
                } catch(e) { return null; }
            };

            const [rtBike, rtFoot] = await Promise.all([fetchRoute('bike', '🚲 Piste Cyclable'), fetchRoute('foot', '🚶‍♂️ Piéton (Raccourci)')]);
            if(rtBike) routes.push(rtBike);
            if(rtFoot && (!rtBike || Math.abs(rtFoot.dist - rtBike.dist) > 0.15)) routes.push(rtFoot);

            if(routes.length === 0) { document.getElementById('suggestions').innerHTML = '<li>Route introuvable.</li>'; return; }

            document.getElementById('suggestions').innerHTML = ''; document.getElementById('route-summary').style.display = 'block';
            renderRouteTabs(); previewRoute(0);
        }

        function renderRouteTabs() {
            const tabs = document.getElementById('route-tabs'); tabs.innerHTML = '';
            routes.forEach((r, i) => {
                const b = document.createElement('button'); b.className = `route-tab ${i===0?'active':''}`; b.innerText = r.name;
                b.onclick = () => previewRoute(i); tabs.appendChild(b);
            });
        }

        function previewRoute(index) {
            document.querySelectorAll('.route-tab').forEach((b, i) => b.className = `route-tab ${i===index?'active':''}`);
            activeRoute = routes[index];
            
            document.getElementById('route-details').innerHTML = `
                <div class="summary-item"><span>Dist:</span> <span>${activeRoute.dist.toFixed(1)} km</span></div>
                <div class="summary-item"><span>Temps:</span> <span>${Math.round((activeRoute.dist/23)*60)} min</span></div>
                <div class="summary-item"><span>D+:</span> <span style="color:#d9534f">+${Math.round(activeRoute.dPlus)}m</span></div>
                <div class="summary-item"><span>D-:</span> <span style="color:var(--green)">-${Math.round(activeRoute.dMinus)}m</span></div>
                <div class="summary-item" style="grid-column: 1 / -1; color:var(--accent); border-top:1px solid #ddd; padding-top:5px; margin-top:2px;">
                    <span>🔋 Batterie estimée:</span> <span>${activeRoute.batt.toFixed(1)} %</span>
                </div>
            `;
            
            if(map.getSource('route')) map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: activeRoute.coords } });
            
            const bounds = new maplibregl.LngLatBounds(); activeRoute.coords.forEach(c => bounds.extend(c));
            map.fitBounds(bounds, { padding: {top: 50, bottom: 350, left: 50, right: 50} });
        }

        function startNavigation() {
            closeSearch(); requestWakeLock();
            isNavigating = true; currentStepIndex = 0;
            
            startNavDistance = totalDistanceCovered; startNavDPlus = totalDPlus; startNavDMinus = totalDMinus;
            startNavWh = totalWhConsumed; 

            document.getElementById('dist-total').innerText = `/ ${activeRoute.dist.toFixed(1)} km`;
            document.getElementById('dplus-total').innerText = `/ ${Math.round(activeRoute.dPlus)} m`;
            document.getElementById('dminus-total').innerText = `/ ${Math.round(activeRoute.dMinus)} m`;
            document.getElementById('batt-total').innerText = `/ ${activeRoute.batt.toFixed(1)} %`;
            
            document.getElementById('dist-val').innerText = "0.0";
            document.getElementById('dplus-val').innerText = "0";
            document.getElementById('dminus-val').innerText = "0";
            document.getElementById('batt-val').innerText = "0.0";
            
            document.getElementById('batt-hud').style.display = 'block';
            document.getElementById('nav-header').style.display = 'flex';
            document.getElementById('eta-widget').style.display = 'flex';
            
            if(userCoords) {
                map.flyTo({ center: [userCoords.lon, userCoords.lat], bearing: currentHeading, pitch: 60, zoom: 17.5, duration: 1500 });
                updateNavigationHUD(userCoords);
            }
        }

        async function recalculateRoute(pos) {
            if (isRecalculating) return;
            isRecalculating = true;
            document.getElementById('nav-street').innerText = "Recalcul...";
            
            const dest = activeRoute.coords[activeRoute.coords.length - 1]; 
            const url = `https://routing.openstreetmap.de/routed-${activeRoute.profile || 'bike'}/route/v1/driving/${pos.lon},${pos.lat};${dest[0]},${dest[1]}?overview=full&geometries=geojson&steps=true`;
            
            try {
                const res = await (await fetch(url)).json();
                if (res.code === "Ok") {
                    const rt = res.routes[0];
                    activeRoute.coords = rt.geometry.coordinates; activeRoute.steps = rt.legs[0].steps; currentStepIndex = 0;
                    
                    const distDone = totalDistanceCovered - startNavDistance;
                    const dPlusDone = totalDPlus - startNavDPlus;
                    const dMinusDone = totalDMinus - startNavDMinus;
                    const battDone = ((totalWhConsumed - startNavWh) / BATTERY_CAPACITY_WH) * 100;
                    
                    const oldRemainingDist = Math.max(0.1, activeRoute.dist - distDone);
                    const realDist = rt.distance / 1000;
                    const ratio = realDist / oldRemainingDist;
                    
                    activeRoute.dist = distDone + realDist; 
                    activeRoute.dPlus = dPlusDone + (activeRoute.dPlus - dPlusDone) * ratio; 
                    activeRoute.dMinus = dMinusDone + (activeRoute.dMinus - dMinusDone) * ratio;
                    activeRoute.batt = battDone + ((activeRoute.batt - battDone) * ratio);
                    
                    document.getElementById('dist-total').innerText = `/ ${activeRoute.dist.toFixed(1)} km`;
                    document.getElementById('dplus-total').innerText = `/ ${Math.round(activeRoute.dPlus)} m`;
                    document.getElementById('dminus-total').innerText = `/ ${Math.round(activeRoute.dMinus)} m`;
                    document.getElementById('batt-total').innerText = `/ ${activeRoute.batt.toFixed(1)} %`;
                    
                    if(map.getSource('route')) map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: activeRoute.coords } });
                }
            } catch(e) {}
            isRecalculating = false;
        }

        function getTurnEmoji(mod, type) {
            if (type === 'arrive') return '🏁'; if (type === 'roundabout') return '🔄';
            switch (mod) {
                case 'uturn': return '↩️'; case 'sharp right': return '⤵️'; case 'right': return '➡️';
                case 'slight right': return '↗️'; case 'straight': return '⬆️'; case 'slight left': return '↖️';
                case 'left': return '⬅️'; case 'sharp left': return '⤴️'; default: return '⬆️';
            }
        }

        function updateNavigationHUD(pos) {
            if(!isNavigating || !activeRoute) return;

            let minD = Infinity, closestIdx = 0;
            for(let i=0; i<activeRoute.coords.length; i++) {
                const d = calcDist(pos, {lat: activeRoute.coords[i][1], lon: activeRoute.coords[i][0]});
                if(d < minD) { minD = d; closestIdx = i; }
            }
            
            if (minD > 45 && !isRecalculating) { recalculateRoute(pos); return; }
            
            let remKm = minD / 1000;
            for(let i=closestIdx; i<activeRoute.coords.length-1; i++) {
                remKm += calcDist({lat: activeRoute.coords[i][1], lon: activeRoute.coords[i][0]}, {lat: activeRoute.coords[i+1][1], lon: activeRoute.coords[i+1][0]}) / 1000;
            }
            
            const ETA = Math.max(1, Math.round((remKm / 23) * 60));
            document.getElementById('eta-val').innerText = `${ETA} min`;

            let distToTurn = 0, nextStep = null;
            if (currentStepIndex < activeRoute.steps.length) {
                nextStep = activeRoute.steps[currentStepIndex];
                distToTurn = calcDist(pos, {lat: nextStep.maneuver.location[1], lon: nextStep.maneuver.location[0]});
                if (distToTurn < 25) {
                    currentStepIndex++;
                    if (currentStepIndex < activeRoute.steps.length) {
                        nextStep = activeRoute.steps[currentStepIndex];
                        distToTurn = calcDist(pos, {lat: nextStep.maneuver.location[1], lon: nextStep.maneuver.location[0]});
                    }
                }
            }

            if (nextStep) {
                let turnText = distToTurn > 1000 ? (distToTurn/1000).toFixed(1) + ' km' : Math.round(distToTurn) + ' m';
                document.getElementById('nav-dist').innerText = turnText;
                document.getElementById('nav-street').innerText = nextStep.maneuver.type === 'arrive' ? 'Arrivée !' : (nextStep.name || 'Continuer');
                document.getElementById('nav-icon').innerText = getTurnEmoji(nextStep.maneuver.modifier, nextStep.maneuver.type);
            }
        }

        function startTracking() {
            if (!navigator.geolocation) return;
            document.getElementById('gps-btn').classList.add('active');
            isTracking = true;

            watchId = navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude, alt = pos.coords.altitude;
                userCoords = { lat, lon, alt };

                let speed = pos.coords.speed;
                document.getElementById('speed-val').innerText = (speed && speed > 0.5) ? Math.round(speed * 3.6) : 0;
                
                if(pos.coords.heading !== null && speed > 0.8) currentHeading = pos.coords.heading; 

                if (!userMarker) {
                    const el = document.createElement('div'); el.className = 'marker-arrow';
                    el.innerHTML = `<svg width="40" height="40" viewBox="0 0 40 40"><path d="M20 5 L35 35 L20 28 L5 35 Z" fill="#007aff" stroke="#ffffff" stroke-width="3"/></svg>`;
                    
                    userMarker = new maplibregl.Marker({element: el, rotationAlignment: 'map', pitchAlignment: 'map'})
                        .setLngLat([lon, lat]).addTo(map);
                    
                    map.flyTo({ center: [lon, lat], pitch: 60, zoom: 17.5, duration: 1500 }); 
                    fetchWeather(lat, lon); requestWakeLock();
                } else {
                    userMarker.setLngLat([lon, lat]);
                    userMarker.setRotation(currentHeading);
                }

                if(isNavigating) {
                    map.easeTo({ center: [lon, lat], bearing: currentHeading, pitch: 60, zoom: 17.5, duration: 1000 });
                } else if(userMarker) {
                    map.easeTo({ center: [lon, lat], bearing: currentHeading, pitch: 60, zoom: 17.5, duration: 1000 }); 
                }

                if (lastPos) {
                    const d = calcDist(lastPos, userCoords) / 1000;
                    if (d > 0.002) {
                        totalDistanceCovered += d;
                        
                        traversedPath.push([lon, lat]);
                        if(map.getSource('path')) map.getSource('path').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: traversedPath } });
                        
                        let currentSlope = 0;
                        if(lastPos.alt !== null && alt !== null) {
                            const diffAlt = alt - lastPos.alt;
                            if (Math.abs(diffAlt) > 2) { 
                                if(diffAlt > 0) totalDPlus += diffAlt; else totalDMinus += Math.abs(diffAlt);
                                currentSlope = diffAlt / (d * 1000);
                                lastPos.alt = alt;
                            }
                        }

                        let p = (0.015*getTotalWeight()*9.81 + 0.5*1.2*0.45*Math.pow(SPEED_MPS,2) + getTotalWeight()*9.81*currentSlope) * SPEED_MPS;
                        if(p < 0) p = 0;
                        totalWhConsumed += ((p/0.75)*(d/SPEED_MPS))/3600;

                        let displayDist = isNavigating ? (totalDistanceCovered - startNavDistance) : totalDistanceCovered;
                        let displayDPlus = isNavigating ? (totalDPlus - startNavDPlus) : totalDPlus;
                        let displayDMinus = isNavigating ? (totalDMinus - startNavDMinus) : totalDMinus;
                        let displayBatt = isNavigating ? ((totalWhConsumed - startNavWh)/BATTERY_CAPACITY_WH)*100 : (totalWhConsumed/BATTERY_CAPACITY_WH)*100;

                        document.getElementById('dist-val').innerText = displayDist.toFixed(1);
                        document.getElementById('dplus-val').innerText = Math.round(displayDPlus);
                        document.getElementById('dminus-val').innerText = Math.round(displayDMinus);
                        document.getElementById('batt-val').innerText = displayBatt.toFixed(1);

                        if(isNavigating) updateNavigationHUD(userCoords);
                    }
                }
                
                if(!lastPos) { lastPos = {lat, lon, alt}; traversedPath.push([lon, lat]); }
                else { lastPos.lat = lat; lastPos.lon = lon; }
                
            }, null, { enableHighAccuracy: true });
        }

        function toggleTracking() {
            if (!isTracking) startTracking();
            else {
                navigator.geolocation.clearWatch(watchId);
                document.getElementById('gps-btn').classList.remove('active');
                isTracking = false;
            }
        }

        window.onload = initMap;
    </script>
</body>
